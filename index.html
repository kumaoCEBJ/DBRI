<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="js/decode.js"></script>
    <script src="_framework/blazor.webassembly.958z1vx7fr.js" autostart="false"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>

    <script>
        Blazor.start({
            loadBootResource: function (type, name, defaultUri, integrity) {
                if (location.hostname === 'localhost' ||
                    type === 'dotnetjs' ||
                    !defaultUri.includes('_framework/')) {
                    return defaultUri;
                }

                let contentType = '';
                if (type === 'dotnetwasm') {
                    contentType = 'application/wasm';
                } else {
                    contentType = 'application/octet-stream';
                }

                const baseUrl = defaultUri.substring(0, defaultUri.indexOf('_framework/'));
                const brUrl = `${baseUrl}_framework/${name}.br`;

                return fetch(brUrl, { cache: 'no-cache' })
                    .then(async file => {
                        if (!file.ok) {
                            return fetch(defaultUri);
                        }
                        const arrayBuffer = await file.arrayBuffer();
                        const dehydrated = BrotliDecode(new Uint8Array(arrayBuffer));

                        return new Response(dehydrated, {
                            headers: { 'content-type': contentType },
                            status: 200,
                            statusText: 'OK'
                        });
                    })
                    .catch(() => {
                        return fetch(defaultUri);
                    });
            }
        });

    </script>
